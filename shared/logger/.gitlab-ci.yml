📦 logger:
  extends:
    - .autodevops_install
    - .cdtn_base_rules
  stage: .pre
  needs: []
  image: node:14.16.0-alpine3.11
  cache:
    key:
      files:
        - yarn.lock
      prefix: ${CI_JOB_NAME}
    paths:
      - .yarn
      - shared/logger/lib
  script:
    - yarn changed list
      --git-range "alpha"
      --include @socialgouv/cdtn-logger
      --json |
      grep -vq "@socialgouv/cdtn-logger"

    - test -d shared/logger/lib &&
      (
      yarn changed list
      --git-range "alpha"
      --include @socialgouv/cdtn-logger
      --json |
      grep -vq "@socialgouv/cdtn-logger"
      ) &&
      echo "Unchanged. Skip !" && exit 0

    # - yarn changed list --git-range "${CI_DEFAULT_BRANCH}" --include @socialgouv/cdtn-logger --json | grep "@socialgouv/cdtn-logger" || echo "Unchanged. Skip !" && exit 0
    - yarn workspaces focus @socialgouv/cdtn-logger
    #
    # NOTE(douglasduteil): group a pipeline in one job
    # To avoid a lenghy pipeline we do all the tasks here...
    #
    - yarn workspace @socialgouv/cdtn-logger run lint
    - yarn workspace @socialgouv/cdtn-logger run test
    - yarn workspace @socialgouv/cdtn-logger run build
  artifacts:
    expire_in: 1 week
    paths:
      - shared/logger/lib
