📦 logger:
  extends:
    - .autodevops_install
    - .cdtn_base_rules
  stage: .pre
  needs: []
  image: node:14.16.0-alpine3.11
  cache:
    key:
      files:
        - yarn.lock
      prefix: ${CI_JOB_NAME}
    paths:
      - .yarn
      - shared/logger/lib
  variables:
    PACKAGE: "@socialgouv/cdtn-logger"
  script:
    # Fetch the default branch
    - apk add --update --no-cache git
    - git fetch origin "${CI_DEFAULT_BRANCH}"

    # List changed packages from this package
    - yarn changed list
      --git-range "origin/${CI_DEFAULT_BRANCH}"
      --include "${PACKAGE}"

    # Is this package in the list ?
    # @returns 0 if present => if the package has changed
    - yarn changed list
      --git-range "origin/${CI_DEFAULT_BRANCH}"
      --include "${PACKAGE}" | grep "${PACKAGE}" &&
      touch GIT_CHANGE_DETECTED

    # Do we have node_modules from the cache and no change
    # @returns 0 if yes => the cache is present
    - test -d node_modules &&
      test ! -f GIT_CHANGE_DETECTED &&
      echo "Unchanged. Skip !" && exit 0

