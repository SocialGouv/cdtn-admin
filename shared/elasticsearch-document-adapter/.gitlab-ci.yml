#
#

📦 elasticsearch-document-adapter:
  extends:
    - .autodevops_install
    - .cdtn_base_rules
  image: node:14.16.0-alpine3.11
  needs:
    - job: 📦 logger
      artifacts: true
  cache:
    key:
      files:
        - yarn.lock
      prefix: ${CI_JOB_NAME}
    paths:
      - .yarn
      - shared/elasticsearch-document-adapter/lib
  variables:
    PACKAGE: "@shared/elasticsearch-document-adapter"
  script:
    # Fetch the default branch
    - apk add --update --no-cache git
    - git fetch origin "${CI_DEFAULT_BRANCH}"

    # List changed packages from this package
    - yarn changed list
      --git-range "origin/${CI_DEFAULT_BRANCH}"
      --include "${PACKAGE}"

    # Is this package in the list ?
    # @returns 0 if present => if the package has changed
    - yarn changed list
      --git-range "origin/${CI_DEFAULT_BRANCH}"
      --include "${PACKAGE}" | grep "${PACKAGE}" &&
      touch GIT_CHANGE_DETECTED

    # Do we have node_modules from the cache and no change
    # @returns 0 if yes => the cache is present
    - test -d node_modules &&
      test ! -f GIT_CHANGE_DETECTED &&
      echo "Unchanged. Skip !" && exit 0

    #
    # This package has change !
    # Go on :)
    - yarn workspaces focus "${PACKAGE}"

    #
    # NOTE(douglasduteil): group a pipeline in one job
    # To avoid a lenghy pipeline we do all the tasks here...
    #
    - yarn workspace "${PACKAGE}" run lint
    - yarn workspace "${PACKAGE}" run test
    - yarn workspace "${PACKAGE}" run build
  artifacts:
    expire_in: 1 week
    paths:
      - shared/elasticsearch-document-adapter/lib
