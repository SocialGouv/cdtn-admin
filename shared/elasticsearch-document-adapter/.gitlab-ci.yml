#
#

📦 elasticsearch-document-adapter:
  extends:
    - .autodevops_install
    - .cdtn_base_rules
  image: node:14.16.0-alpine3.11
  needs:
    - job: 📦 logger
      artifacts: true
  cache:
    key:
      files:
        - yarn.lock
      prefix: ${CI_JOB_NAME}
    paths:
      - .yarn
      - shared/elasticsearch-document-adapter/lib
  script:
    - apk add --update --no-cache git
    - git fetch origin "${CI_DEFAULT_BRANCH}"

    - test -d shared/elasticsearch-document-adapter/lib &&
      yarn changed list
      --git-range "origin/${CI_DEFAULT_BRANCH}"
      --include "@shared/elasticsearch-document-adapter"
      --json |
      grep -vq "@shared/elasticsearch-document-adapter" &&
      echo "Unchanged. Skip !" && exit 0

    - yarn workspaces focus @shared/elasticsearch-document-adapter
    #
    # NOTE(douglasduteil): group a pipeline in one job
    # To avoid a lenghy pipeline we do all the tasks here...
    #
    - yarn workspace @shared/elasticsearch-document-adapter run lint
    - yarn workspace @shared/elasticsearch-document-adapter run test
    - yarn workspace @shared/elasticsearch-document-adapter run build
  artifacts:
    expire_in: 1 week
    paths:
      - shared/elasticsearch-document-adapter/lib
