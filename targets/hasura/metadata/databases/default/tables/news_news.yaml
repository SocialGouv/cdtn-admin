table:
  name: news
  schema: news
configuration:
  column_config:
    created_at:
      custom_name: createdAt
    display_date:
      custom_name: displayDate
    meta_description:
      custom_name: metaDescription
    meta_title:
      custom_name: metaTitle
    updated_at:
      custom_name: updatedAt
  custom_column_names:
    created_at: createdAt
    display_date: displayDate
    meta_description: metaDescription
    meta_title: metaTitle
    updated_at: updatedAt
  custom_root_fields: {}
array_relationships:
  - name: news_cdtn_references
    using:
      foreign_key_constraint_on:
        column: news_id
        table:
          name: news_cdtn_references
          schema: news
insert_permissions:
  - role: super
    permission:
      check: {}
      columns:
        - display_date
        - content
        - meta_description
        - meta_title
        - title
        - created_at
        - updated_at
        - id
    comment: ""
select_permissions:
  - role: super
    permission:
      columns:
        - display_date
        - content
        - meta_description
        - meta_title
        - title
        - created_at
        - updated_at
        - id
      filter: {}
    comment: ""
update_permissions:
  - role: super
    permission:
      columns:
        - display_date
        - content
        - meta_description
        - meta_title
        - title
        - created_at
        - updated_at
        - id
      filter: {}
      check: {}
    comment: ""
delete_permissions:
  - role: super
    permission:
      filter: {}
    comment: ""
