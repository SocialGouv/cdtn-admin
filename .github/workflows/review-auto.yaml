name: 👓 Review Auto
on:
  push:
    branches:
      - "**"
      - "!renovate/**"
      - "!dependabot/**"
      - "!master"
      - "!main"

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.ref }}

jobs:
  build-frontend:
    permissions:
      contents: read
      id-token: write # OIDC identity for buildkit-operator /route auth
    environment: build-review-auto
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    runs-on: ubuntu-latest
    steps:
      - name: ⏬ Checkout code repository
        uses: actions/checkout@v4

      - name: 📌 Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.REGISTRY_URL }}/${{ vars.PROJECT_NAME }}/${{ github.event.repository.name }}/frontend
          tags: |
            type=raw,value=persist-{{sha}},enable=${{
              github.ref_name == 'dev' ||
              github.ref_name == 'develop' ||
              github.ref_name == 'preprod' ||
              github.ref_name == 'main' ||
              github.ref_name == 'master'
            }},priority=840
            type=sha,prefix=sha-,format=long,priority=890
            type=ref,event=branch,priority=600

      - name: Env
        id: env
        uses: socialgouv/kontinuous/.github/actions/env@v1

      - name: 🔑 Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: 📦 Build and push Docker image for frontend
        uses: socialgouv/buildkit-operator@v1
        with:
          buildd-url: ${{ vars.BUILDKIT_OPERATOR_BUILDD_URL }}
          gateway-host: ${{ vars.BUILDKIT_OPERATOR_GATEWAY_HOST }}
          ca: ${{ secrets.BUILDKIT_OPERATOR_CA }}
          cert: ${{ secrets.BUILDKIT_OPERATOR_CERT }}
          key: ${{ secrets.BUILDKIT_OPERATOR_KEY }}
          context: "."
          file: "targets/frontend/Dockerfile"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_BASE_PATH=https://www-${{ steps.env.outputs.subdomain }}.ovh.fabrique.social.gouv.fr
            NEXT_PUBLIC_BUCKET_PUBLIC_ENDPOINT=https://cdtn-dev-public.s3.gra.io.cloud.ovh.net
            NEXT_PUBLIC_BUCKET_DEFAULT_FOLDER=default
            NEXT_PUBLIC_BUCKET_DRAFT_FOLDER=draft
          secrets: |
            NPM_TIPTAP_TOKEN=${{ secrets.NPM_TIPTAP_TOKEN }}
          push: true

  build-ingester:
    permissions:
      contents: read
      id-token: write # OIDC identity for buildkit-operator /route auth
    environment: build-review-auto
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    runs-on: ubuntu-latest
    steps:
      - name: ⏬ Checkout code repository
        uses: actions/checkout@v4

      - name: 📌 Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.REGISTRY_URL }}/${{ vars.PROJECT_NAME }}/${{ github.event.repository.name }}/ingester
          tags: |
            type=raw,value=persist-{{sha}},enable=${{
              github.ref_name == 'dev' ||
              github.ref_name == 'develop' ||
              github.ref_name == 'preprod' ||
              github.ref_name == 'main' ||
              github.ref_name == 'master'
            }},priority=840
            type=sha,prefix=sha-,format=long,priority=890
            type=ref,event=branch,priority=600

      - name: 🔑 Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: 📦 Build and push Docker image for ingester
        uses: socialgouv/buildkit-operator@v1
        with:
          buildd-url: ${{ vars.BUILDKIT_OPERATOR_BUILDD_URL }}
          gateway-host: ${{ vars.BUILDKIT_OPERATOR_GATEWAY_HOST }}
          ca: ${{ secrets.BUILDKIT_OPERATOR_CA }}
          cert: ${{ secrets.BUILDKIT_OPERATOR_CERT }}
          key: ${{ secrets.BUILDKIT_OPERATOR_KEY }}
          context: "."
          file: "targets/ingester/Dockerfile"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true

  build-alert:
    permissions:
      contents: read
      id-token: write # OIDC identity for buildkit-operator /route auth
    environment: build-review-auto
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    runs-on: ubuntu-latest
    steps:
      - name: ⏬ Checkout code repository
        uses: actions/checkout@v4

      - name: 📌 Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.REGISTRY_URL }}/${{ vars.PROJECT_NAME }}/${{ github.event.repository.name }}/alert
          tags: |
            type=raw,value=persist-{{sha}},enable=${{
              github.ref_name == 'dev' ||
              github.ref_name == 'develop' ||
              github.ref_name == 'preprod' ||
              github.ref_name == 'main' ||
              github.ref_name == 'master'
            }},priority=840
            type=sha,prefix=sha-,format=long,priority=890
            type=ref,event=branch,priority=600

      - name: 🔑 Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: 📦 Build and push Docker image for alert
        uses: socialgouv/buildkit-operator@v1
        with:
          buildd-url: ${{ vars.BUILDKIT_OPERATOR_BUILDD_URL }}
          gateway-host: ${{ vars.BUILDKIT_OPERATOR_GATEWAY_HOST }}
          ca: ${{ secrets.BUILDKIT_OPERATOR_CA }}
          cert: ${{ secrets.BUILDKIT_OPERATOR_CERT }}
          key: ${{ secrets.BUILDKIT_OPERATOR_KEY }}
          context: "."
          file: "targets/alert-cli/Dockerfile"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true

  build-analysis:
    permissions:
      contents: read
      id-token: write # OIDC identity for buildkit-operator /route auth
    environment: build-review-auto
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    runs-on: ubuntu-latest
    steps:
      - name: ⏬ Checkout code repository
        uses: actions/checkout@v4

      - name: 📌 Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.REGISTRY_URL }}/${{ vars.PROJECT_NAME }}/${{ github.event.repository.name }}/analysis
          tags: |
            type=semver,pattern=v{{version}},priority=900
            type=sha,prefix=sha-,format=long,priority=890
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }},priority=200

      - name: 🔑 Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: 📦 Build and push Docker image for analysis
        uses: socialgouv/buildkit-operator@v1
        with:
          buildd-url: ${{ vars.BUILDKIT_OPERATOR_BUILDD_URL }}
          gateway-host: ${{ vars.BUILDKIT_OPERATOR_GATEWAY_HOST }}
          ca: ${{ secrets.BUILDKIT_OPERATOR_CA }}
          cert: ${{ secrets.BUILDKIT_OPERATOR_CERT }}
          key: ${{ secrets.BUILDKIT_OPERATOR_KEY }}
          context: "analysis"
          file: "analysis/Dockerfile"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true

  build-export:
    permissions:
      contents: read
      id-token: write # OIDC identity for buildkit-operator /route auth
    environment: build-review-auto
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    runs-on: ubuntu-latest
    steps:
      - name: ⏬ Checkout code repository
        uses: actions/checkout@v4

      - name: 📌 Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.REGISTRY_URL }}/${{ vars.PROJECT_NAME }}/${{ github.event.repository.name }}/export
          tags: |
            type=raw,value=persist-{{sha}},enable=${{
              github.ref_name == 'dev' ||
              github.ref_name == 'develop' ||
              github.ref_name == 'preprod' ||
              github.ref_name == 'main' ||
              github.ref_name == 'master'
            }},priority=840
            type=sha,prefix=sha-,format=long,priority=890
            type=ref,event=branch,priority=600

      - name: 🔑 Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: 📦 Build and push Docker image for export
        uses: socialgouv/buildkit-operator@v1
        with:
          buildd-url: ${{ vars.BUILDKIT_OPERATOR_BUILDD_URL }}
          gateway-host: ${{ vars.BUILDKIT_OPERATOR_GATEWAY_HOST }}
          ca: ${{ secrets.BUILDKIT_OPERATOR_CA }}
          cert: ${{ secrets.BUILDKIT_OPERATOR_CERT }}
          key: ${{ secrets.BUILDKIT_OPERATOR_KEY }}
          context: "."
          file: "targets/export-elasticsearch/Dockerfile"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secrets: |
            NPM_TIPTAP_TOKEN=${{ secrets.NPM_TIPTAP_TOKEN }}
          push: true

  build-hasura:
    permissions:
      contents: read
      id-token: write # OIDC identity for buildkit-operator /route auth
    environment: build-review-auto
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    runs-on: ubuntu-latest
    steps:
      - name: ⏬ Checkout code repository
        uses: actions/checkout@v4

      - name: 📌 Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.REGISTRY_URL }}/${{ vars.PROJECT_NAME }}/${{ github.event.repository.name }}/hasura
          tags: |
            type=raw,value=persist-{{sha}},enable=${{
              github.ref_name == 'dev' ||
              github.ref_name == 'develop' ||
              github.ref_name == 'preprod' ||
              github.ref_name == 'main' ||
              github.ref_name == 'master'
            }},priority=840
            type=sha,prefix=sha-,format=long,priority=890
            type=ref,event=branch,priority=600

      - name: 🔑 Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: 📦 Build and push Docker image for hasura
        uses: socialgouv/buildkit-operator@v1
        with:
          buildd-url: ${{ vars.BUILDKIT_OPERATOR_BUILDD_URL }}
          gateway-host: ${{ vars.BUILDKIT_OPERATOR_GATEWAY_HOST }}
          ca: ${{ secrets.BUILDKIT_OPERATOR_CA }}
          cert: ${{ secrets.BUILDKIT_OPERATOR_CERT }}
          key: ${{ secrets.BUILDKIT_OPERATOR_KEY }}
          context: "targets/hasura"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true

  kontinuous:
    needs:
      [
        build-frontend,
        build-ingester,
        build-alert,
        build-analysis,
        build-export,
        build-hasura,
      ]
    name: "Deploy on Kubernetes 🐳"
    uses: socialgouv/workflows/.github/workflows/use-ks-gh-review-auto-atlas.yaml@v1
    secrets: inherit
